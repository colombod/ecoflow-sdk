name: CI

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Unit tests
        run: uv run pytest -m "not integration and not write_integration" -v

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "3.11"
      - run: uv sync --all-extras
      - name: Integration tests (read-only)
        env:
          ECOFLOW_ACCESS_KEY: ${{ secrets.ECOFLOW_ACCESS_KEY }}
          ECOFLOW_SECRET_KEY: ${{ secrets.ECOFLOW_SECRET_KEY }}
          ECOFLOW_REGION: ${{ secrets.ECOFLOW_REGION }}
          ECOFLOW_TEST_DEVICE_SN: ${{ secrets.ECOFLOW_TEST_DEVICE_SN }}
        run: uv run pytest -m integration --timeout=60 -v
        continue-on-error: true
